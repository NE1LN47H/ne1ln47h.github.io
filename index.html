<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Neilnath | Portfolio</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron&display=swap');

        body { 
            background: #000; 
            color: #0ff; 
            font-family: 'Orbitron', sans-serif; 
            text-align: center; 
            overflow: hidden;
        }

        /* Particle Background */
        #particles-js { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            z-index: -1; 
        }

        /* Glowing Navbar */
        .navbar {
            background: rgba(0, 0, 0, 0.7);
            border-bottom: 2px solid cyan;
            box-shadow: 0 0 10px cyan;
        }
        .navbar a {
            color: cyan;
            transition: 0.3s;
        }
        .navbar a:hover {
            color: #000;
            background: cyan;
            border-radius: 5px;
            box-shadow: 0 0 15px cyan;
        }

        /* Hero Section */
        .hero {
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            flex-direction: column;
        }
        h1 {
            font-size: 3rem; 
            text-shadow: 0 0 10px cyan; 
        }

        .btn-glow {
            background: transparent; 
            border: 2px solid cyan; 
            color: cyan; 
            padding: 10px 20px; 
            transition: 0.3s;
        }
        .btn-glow:hover {
            background: cyan; 
            color: #000; 
            box-shadow: 0 0 15px cyan;
        }
    </style>
</head>
<body>

    <!-- Particle Background -->
    <div id="particles-js"></div>

    <!-- Glowing Navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="#">Neilnath</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#about">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="#skills">Skills</a></li>
                    <li class="nav-item"><a class="nav-link" href="#projects">Projects</a></li>
                    <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <div class="hero">
        <h1 id="title">Neilnath</h1>
        <p>Mern Stack | Developer</p>
        <button class="btn btn-glow">Click Me</button>
    </div>

    <!-- GSAP Animation -->
    <script>
        gsap.from("#title", { opacity: 0, y: -50, duration: 1.5, ease: "power3.out" });
        gsap.to(".hero", { background: "radial-gradient(circle, rgba(0,255,255,0.1) 0%, rgba(0,0,0,1) 100%)", duration: 2 });
    </script>

    <!-- Particles.js -->
    <script>
        particlesJS("particles-js", {
            particles: {
                number: { value: 100 },
                color: { value: "#0ff" },
                shape: { type: "circle" },
                opacity: { value: 0.5 },
                size: { value: 3 },
                move: { enable: true, speed: 2 }
            }
        });
    </script>

</body>
</html>
